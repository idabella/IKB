[tool.pytest.ini_options]
asyncio_mode       = "auto"
testpaths          = ["tests"]
python_files       = ["test_*.py"]
python_classes     = ["Test*"]
python_functions   = ["test_*"]
addopts            = "-v --tb=short --strict-markers"
markers = [
    "unit: pure unit tests with no I/O",
    "integration: tests that spin up the FastAPI app",
    "e2e: full end-to-end tests requiring running services",
    "slow: tests that take > 5 seconds",
]

[tool.coverage.run]
source   = ["backend"]
omit     = ["*/tests/*", "*/migrations/*", "*/__pycache__/*"]
branch   = true

[tool.coverage.report]
show_missing   = true
skip_covered   = false
fail_under     = 70
exclude_lines  = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
