---
# =============================================================================
# Telemetry Aggregator — Kubernetes Deployment
# NOTE: workers=1 per pod; scale via replicas, not workers.
#       Each replica runs one Kafka consumer in a dedicated consumer group
#       so Kafka handles partition assignment automatically.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-aggregator
  namespace: ikb
  labels:
    app: telemetry-aggregator
    component: backend
    version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemetry-aggregator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: telemetry-aggregator
        component: backend
        version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 90   # allow Kafka consumer to finish batch
      containers:
        - name: telemetry-aggregator
          image: ikb/telemetry-aggregator:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: telemetry_aggregator
            - name: SERVICE_VERSION
              value: "0.1.0"
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ikb-secrets
                  key: database-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: ikb-config
                  key: kafka-bootstrap-servers
            - name: INFLUXDB_URL
              valueFrom:
                configMapKeyRef:
                  name: ikb-config
                  key: influxdb-url
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ikb-secrets
                  key: influxdb-token
            - name: INFLUXDB_ORG
              valueFrom:
                configMapKeyRef:
                  name: ikb-config
                  key: influxdb-org
            - name: INFLUXDB_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: ikb-config
                  key: influxdb-bucket
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ikb-secrets
                  key: redis-url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ikb-config
                  key: otel-endpoint
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
---
# =============================================================================
# Telemetry Aggregator — Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: telemetry-aggregator
  namespace: ikb
  labels:
    app: telemetry-aggregator
spec:
  selector:
    app: telemetry-aggregator
  ports:
    - name: http
      protocol: TCP
      port: 8002
      targetPort: 8002
  type: ClusterIP
---
# =============================================================================
# Telemetry Aggregator — HPA (Kafka-consumer-lag aware)
# For optimal Kafka scaling, also set up KEDA ScaledObject with
# Kafka trigger — see docs/kafka-keda-scaling.md
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: telemetry-aggregator-hpa
  namespace: ikb
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: telemetry-aggregator
  minReplicas: 2
  maxReplicas: 8           # bounded by Kafka partition count (ikb.sensors.raw = 32 partitions)
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # fast scale-up for telemetry bursts
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 600   # very conservative scale-down (stateful Kafka consumer)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
