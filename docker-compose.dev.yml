version: "3.9"

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - ikb-network

x-backend-defaults: &backend-defaults
  <<: *service-defaults
  build:
    context: .
    dockerfile: infrastructure/docker/Dockerfile.service
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy

services:
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # INFRASTRUCTURE
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  postgres:
    <<: *service-defaults
    image: timescale/timescaledb:latest-pg16
    container_name: ikb-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ikb_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ikb_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-ikb_main}
    command: >
      postgres
      -c shared_preload_libraries=timescaledb
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/migrations:/docker-migrations:ro
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ikb_admin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    container_name: ikb-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-ikb_redis_2024} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ikb_redis_2024}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # â”€â”€ Zookeeper removed (Phase 2) â€” Kafka now runs in KRaft mode â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # KRaft = Kafka Raft â€” built-in consensus, no external coordinator needed.
  # Reduces: 1 container, 2 ports, 2 volumes (zookeeper_data, zookeeper_logs).

  kafka:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.6.0
    container_name: ikb-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "29092:29092"
    environment:
      # KRaft identity
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      # Broker tuning
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.6.0
    container_name: ikb-kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics (KRaft mode)..."
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic ikb.sensors.raw       --partitions 32 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic ikb.sensors.processed --partitions 16 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic ikb.anomalies          --partitions 8  --replication-factor 1 --config retention.ms=2592000000
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic ikb.alerts             --partitions 4  --replication-factor 1 --config retention.ms=-1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic ikb.documents.ingestion --partitions 4 --replication-factor 1
        echo "All Kafka topics created."
        kafka-topics --bootstrap-server kafka:29092 --list

  qdrant:
    <<: *service-defaults
    image: qdrant/qdrant:latest
    container_name: ikb-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    <<: *service-defaults
    image: neo4j:5.12
    container_name: ikb-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ikb_neo4j_2024}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-ikb_neo4j_2024} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # â”€â”€ InfluxDB removed (Phase 3) â€” time-series now served by TimescaleDB â”€â”€â”€â”€â”€â”€
  # Remove all INFLUXDB_* env vars and the influxdb service block.
  # Run `make migrate-003` after upgrading to apply the hypertable migration.

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # MONITORING
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:latest
    container_name: ikb-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"

  grafana:
    <<: *service-defaults
    image: grafana/grafana:latest
    container_name: ikb-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-ikb_grafana_2024}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  jaeger:
    <<: *service-defaults
    image: jaegertracing/all-in-one:latest
    container_name: ikb-jaeger
    profiles: ["tracing"]     # start with: docker compose --profile tracing up
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "4317:4317"
      - "4318:4318"
      - "6831:6831/udp"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # ML PLATFORM
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  mlflow:
    <<: *service-defaults
    image: ghcr.io/mlflow/mlflow:latest
    container_name: ikb-mlflow
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-ikb_admin}:${POSTGRES_PASSWORD:-ikb_secret_2024}@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-ikb_admin}:${POSTGRES_PASSWORD:-ikb_secret_2024}@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
    # Phase 2: MLflow is a background service â€” backend services start independently.
    # The ML detector gracefully falls back to statistical detection if MLflow is unavailable.
    depends_on:
      postgres:
        condition: service_healthy

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # BACKEND SERVICES
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  api-gateway:
    <<: *backend-defaults
    container_name: ikb-api-gateway
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: api_gateway
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    environment:
      SERVICE_NAME: api_gateway
      SERVICE_PORT: 8000
      OTEL_SERVICE_NAME: api-gateway
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      REDIS_URL: redis://:${REDIS_PASSWORD:-ikb_redis_2024}@redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      # Route agent/query traffic to the consolidated Knowledge Engine
      KNOWLEDGE_ENGINE_URL: http://knowledge-engine:8001
      AGENT_SERVICE_URL: http://knowledge-engine:8001   # legacy fallback alias
      # Route telemetry queries through the gateway (Phase 4)
      TELEMETRY_AGGREGATOR_URL: http://telemetry-aggregator:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      knowledge-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  knowledge-engine:
    <<: *backend-defaults
    container_name: ikb-knowledge-engine
    build:
      context: .
      # Uses the service-specific Dockerfile (not the generic one)
      dockerfile: backend/services/knowledge_engine/Dockerfile
    ports:
      - "${KNOWLEDGE_ENGINE_PORT:-8001}:8001"
    environment:
      SERVICE_NAME: knowledge_engine
      SERVICE_VERSION: "0.1.0"
      OTEL_SERVICE_NAME: knowledge-engine
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      DATABASE_URL: postgresql://${POSTGRES_USER:-ikb_admin}:${POSTGRES_PASSWORD:-ikb_secret_2024}@postgres:5432/${POSTGRES_DB:-ikb_main}
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ikb_neo4j_2024}
      REDIS_URL: redis://:${REDIS_PASSWORD:-ikb_redis_2024}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDING_DIM: ${GEMINI_EMBEDDING_DIM:-768}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-default}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  telemetry-aggregator:
    <<: *backend-defaults
    container_name: ikb-telemetry-aggregator
    build:
      context: .
      dockerfile: backend/services/telemetry_aggregator/Dockerfile
    ports:
      - "${TELEMETRY_PORT:-8002}:8002"
    environment:
      SERVICE_NAME: telemetry_aggregator
      SERVICE_VERSION: "0.1.0"
      OTEL_SERVICE_NAME: telemetry-aggregator
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      DATABASE_URL: postgresql://${POSTGRES_USER:-ikb_admin}:${POSTGRES_PASSWORD:-ikb_secret_2024}@postgres:5432/${POSTGRES_DB:-ikb_main}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://:${REDIS_PASSWORD:-ikb_redis_2024}@redis:6379/1
      KNOWLEDGE_ENGINE_URL: http://knowledge-engine:8001
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-default}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s


  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # FRONTEND
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  frontend:
    <<: *service-defaults
    container_name: ikb-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_GATEWAY_PORT:-8000}
      NEXT_PUBLIC_WS_URL: ws://localhost:${API_GATEWAY_PORT:-8000}
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  # zookeeper_data: removed (Phase 2 â€” KRaft mode)
  # zookeeper_logs: removed (Phase 2 â€” KRaft mode)
  kafka_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  grafana_data:
  mlflow_data:
  # influxdb_data: removed (Phase 3 â€” replaced by TimescaleDB)

networks:
  ikb-network:
    driver: bridge
    name: ikb-network


